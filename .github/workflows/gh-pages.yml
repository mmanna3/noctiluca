name: CI y Deploy

# CI en cada push y PR; deploy solo en main.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    name: Lint, tests y build
    runs-on: ubuntu-latest
    steps:
      - name: Checkoutear repo
        uses: actions/checkout@v4

      - name: Set de versión de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "yarn"

      - name: Instalar dependencias
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Tests
        run: yarn test

      - name: Buildear (incluye chequeos de performance)
        run: yarn build:ci

  deploy:
    name: Deploy por FTP
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkoutear repo
        uses: actions/checkout@v4

      - name: Set de versión de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "yarn"

      - name: Instalar dependencias
        run: yarn install --frozen-lockfile

      - name: Buildear
        run: yarn build:ci
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deployar por FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.NOCTILUCA_SERVER_DIR }}
          port: ${{ secrets.FTP_PORT || '21' }}
          protocol: ${{ secrets.FTP_PROTOCOL || 'ftp' }}
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.hg*
            **/.hg*/**
            **/.svn/**
            **/.DS_Store
            **/Thumbs.db
